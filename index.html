# Agentic Engineering

A comprehensive reference to autonomous coding agents, agentic organizations, and the emerging patterns of AI-native software engineering.

---

## What is Agentic Engineering?

Agentic engineering is the practice of using autonomous AI agents to write, test, and ship production code with minimal human intervention. Unlike interactive AI assistants (copilots), agentic systems take a task description and produce a complete pull request — running tests, fixing linter errors, and iterating on CI failures along the way.

The shift from "human writes code with AI help" to "AI writes code with human review" is fundamentally changing how engineering organizations operate, enabling parallelization of work that was previously bottlenecked on developer attention.

## Core Concepts

- **One-Shot Execution** — Agents take a task and produce a PR end-to-end, with no human interaction in between. Engineers spin up many agents in parallel.
- **Sandbox Isolation** — Each agent runs in an isolated environment — devboxes, Docker containers, or git worktrees — safely separated from production.
- **Feedback Loops** — Agents iterate against linters, tests, and CI pipelines. Local checks catch issues fast; CI provides the final validation gate.
- **Context via MCP** — Model Context Protocol provides agents with docs, tickets, code intelligence, and internal tools through a standard interface.
- **Orchestration** — Blueprints, patchflows, and workflow graphs interleave deterministic steps with agentic creativity for reliable execution.
- **Failure Recovery** — Structured retry, split, escalate, and accept-with-debt strategies handle the inevitable failures in autonomous systems.

## The Agentic Engineering Flow

Most autonomous coding agents follow a similar high-level pipeline:

```
Task Input → Context Gathering → Planning → Implementation → Local Testing → CI Validation → Pull Request
```

The key differentiators between approaches lie in **how they handle failure** at each stage, **how they manage context** within the LLM's window, and **how they isolate** parallel agent runs.

# Approaches to Agentic Coding

A deep dive into the major systems and frameworks driving autonomous software engineering — from enterprise-internal platforms to open-source tools.

## Stripe Minions

- **Type:** Enterprise / Internal
- **Scale:** 1,300+ PRs merged per week
- **Based on:** Goose fork
- **Blog:** https://stripe.dev/blog/minions-stripes-one-shot-end-to-end-coding-agents

Stripe's homegrown coding agents are the industry benchmark for unattended, one-shot agentic coding at enterprise scale. Engineers invoke minions from Slack, internal tools, or CLI, and receive a complete pull request with no human-written code.

### Architecture

- **Blueprints** — Hybrid state machines interleaving deterministic nodes (git, linting, push) with agentic subtasks (implementation, CI fixes)
- **Devboxes** — Isolated EC2 environments pre-warmed in ~10 seconds, identical to human dev machines
- **Toolshed MCP** — Centralized MCP server with ~500 tools for internal systems and SaaS platforms
- **Conditional rules** — Cursor-format rule files applied by subdirectory to avoid context bloat
- **Pre-hydration** — Deterministic MCP tool runs on linked URLs before agent loop starts

### Key Properties

- One-shot design — Task in, PR out, no interaction in between
- Max 2 CI rounds — Local lint first, then at most two CI iterations
- Production isolation — Devboxes cut off from production and internet
- Parallel execution — Engineers routinely spin up multiple minions simultaneously
- Same tools as humans — If it's good for humans, it's good for LLMs
- Auto-fixes — Many test failures have autofixes that are applied automatically

### Flow

```
Slack / CLI → Devbox → Pre-hydrate Context → Blueprint Loop → Local Lint → CI (x2 max) → PR
```

---

## AgentField

- **Type:** Open Source (Apache 2.0)
- **Role:** Control Plane + Orchestration Framework
- **GitHub:** https://github.com/Agent-Field/agentfield
- **Blog:** https://agentfield.ai/blog/beyond-vibe-coding

AgentField is both a control plane for managing AI agents as production services and an orchestration framework (SWE-AF) for multi-agent coding workflows. It addresses the infrastructure gap that Stripe solved internally.

### Control Plane

- **Agent registration & routing** — REST APIs, WebSocket connections, execution queues (PostgreSQL-backed)
- **Canary & blue-green deploys** — Per-version health tracking and traffic routing
- **Cryptographic identity** — W3C DIDs per agent with verifiable credentials
- **Memory system** — KV storage + vector search across four scopes
- **SDKs** — Python, Go, TypeScript

### SWE-AF Orchestration

- **Two primitives** — `.ai()` for cheap routing calls, `.harness()` for full coding environments (up to 150 turns)
- **Three failure loops** — Inner (per-issue retries, up to 5), Middle (typed recovery: retry, split, escalate, accept-with-debt), Outer (replanner for cascading failures)
- **Git worktree isolation** — Each issue gets its own branch and working directory
- **Checkpoint-based execution** — Resumes from failure point, never restarts
- **Intent-aware merging** — Merger agent resolves conflicts between parallel branches
- **Typed debt tracking** — Downstream agents work around known gaps

### Results

- Diagrams-as-code Rust CLI: 15 issues, 200+ invocations, $116 total
- Go SDK feature: 10 issues, 80+ invocations, $19 total
- Architecture quality > model capability: scored 95/100 with both Haiku and MiniMax M2.5

---

## OpenHands

- **Type:** Open Source (MIT)
- **Stars:** 71K
- **GitHub:** https://github.com/OpenHands/OpenHands

Formerly OpenDevin, OpenHands is the most mature open-source autonomous software engineer. It clones repos, runs terminal commands, executes tests, debugs errors, and produces PRs — all inside a sandboxed Docker container.

### Architecture

- **Docker sandboxing** — Full OS-level isolation per agent run
- **Planning Mode** — Added in v1.6.0 for structured task decomposition
- **Web GUI + CLI + SDK** — Multiple interfaces for different workflows
- **Kubernetes support** — Scalable deployment for enterprise use

### Key Properties

- 50%+ SWE-bench — Solves over half of real GitHub issues in benchmarks
- GitHub issue trigger — Can be invoked directly from issue comments
- CI feedback — Runs tests and iterates on failures
- $18.8M Series A — Well-funded with active development
- **Gap:** No built-in blueprint/workflow DSL or multi-agent parallelization

---

## Open SWE (LangChain)

- **Type:** Open Source
- **Stars:** 9.5K
- **GitHub:** https://github.com/langchain-ai/open-swe

LangChain's cloud-native async coding agent, explicitly modeled on patterns from companies like Stripe, Ramp, and Coinbase. Uses a multi-agent architecture built on LangGraph.

### Architecture

- **LangGraph orchestration** — Graph-based workflow engine, closest open-source analog to Stripe's blueprints
- **Multi-agent decomposition** — Manager, Planner, Programmer, Reviewer agents
- **Cloud sandbox** — Isolated cloud execution environments
- **Async-first** — Designed for unattended background execution

### Key Properties

- Automatic PR creation — End-to-end from issue to pull request
- Self-review — Reviewer agent checks code before PR creation
- Enterprise patterns — Designed to capture patterns from production agentic systems
- **Gap:** Newer project, less battle-tested than OpenHands

---

## OhMyOpenAgent

- **Type:** Open Source
- **Stars:** 50.6K
- **GitHub:** https://github.com/code-yeongyu/oh-my-openagent

A multi-agent orchestration harness with named specialist agents, hash-anchored edits for reliability, and automatic multi-model routing. Focuses on solving the practical failure modes that generic agent frameworks overlook.

### Architecture

- **Named agents** — Sisyphus (orchestrator), Hephaestus (deep worker), Prometheus (strategic planner), Oracle (debugger), Librarian (docs)
- **Hash-anchored edits (Hashline)** — Each line carries a content hash for verification before applying changes (improved success from 6.7% to 68.3%)
- **Multi-model routing** — Auto-routes tasks to appropriate models (visual, reasoning, quick fix, ultrabrain)
- **LSP + AST-Grep** — IDE-precision refactoring and AST-aware code search

### Key Properties

- `ultrawork` command — Single-word activation triggering full agent team
- Ralph Loop — Self-referential iteration until task completion
- Todo Enforcer — Pulls agents back from idle states
- Comment validation — Prevents AI-generated prose in code
- `/init-deep` — Auto-generates hierarchical AGENTS.md files across projects
- Built-in MCPs — Exa search, Context7 docs, Grep.app

## OpenCode

- **Type:** Open Source
- **Stars:** 142K
- **GitHub:** https://github.com/anomalyco/opencode

The most-starred open-source coding agent, featuring a TUI, client/server architecture, and a GitHub agent mode for unattended repository automation via GitHub Actions.

### Architecture

- **Client/server model** — Separates UI from execution for flexibility
- **GitHub agent mode** — Triggered by GitHub events, runs in Actions
- **Provider-agnostic** — Claude, OpenAI, Google, local models
- **TUI interface** — Rich terminal UI for interactive use

### Key Properties

- Massive adoption — 142K stars, largest coding agent community
- Event-driven — GitHub agent mode mirrors Minions' event-driven model
- Extensible — Plugin architecture for custom tools
- **Gap:** Primarily interactive; GitHub agent mode is newer

## SWE-agent

- **Type:** Open Source (MIT)
- **Stars:** 19K
- **Origin:** Princeton / Stanford
- **GitHub:** https://github.com/SWE-agent/SWE-agent

Pioneered the "GitHub issue in, pull request out" paradigm. Published at NeurIPS 2024. Also produced mini-swe-agent, a 100-line agent scoring 74%+ on SWE-bench.

### Architecture

- **Docker isolation** — Sandboxed execution environment per run
- **Issue-to-PR pipeline** — Takes a GitHub issue URL and produces a fix
- **Custom agent interface** — Optimized shell commands for LLM interaction

### Key Properties

- Research-grade — NeurIPS 2024 publication with rigorous evaluation
- mini-swe-agent — 100-line minimal version scoring 74%+ on benchmarks
- **Gap:** No workflow orchestration, limited CI integration, single-agent only

## Composio Agent Orchestrator

- **Type:** Open Source
- **Stars:** 6.2K
- **GitHub:** https://github.com/ComposioHQ/agent-orchestrator

The best open-source match for Stripe's multi-agent parallelization pattern. Decomposes tasks, spawns parallel agents, and autonomously handles CI fixes and merge conflicts.

### Architecture

- **Task decomposition** — Plans and breaks work into parallel subtasks
- **Parallel agent spawning** — Multiple agents working simultaneously
- **CI feedback loop** — Automatically handles test failures
- **Merge conflict resolution** — Handles conflicts from parallel work

### Key Properties

- Best parallelization — Closest match to "spin up many minions"
- Code review — Automated review before PR creation
- **Gap:** Orchestration layer, not a complete standalone agent

## Patchwork

- **Type:** Open Source
- **Stars:** 1.5K
- **GitHub:** https://github.com/patched-codes/patchwork

Framework for patching code repos using LLMs. Its "patchflows" — reusable workflows combining atomic actions with LLM prompts — are the closest open-source analog to Stripe's blueprint pattern.

### Architecture

- **Patchflows** — Deterministic steps (create PR, commit, lint) + LLM prompts, similar to blueprints
- **Built-in flows** — AutoFix, PRReview, GenerateDocstring
- **CI/CD integration** — Runs in pipelines natively

### Key Properties

- Blueprint analog — Closest match to Stripe's hybrid orchestration
- Composable — Mix and match atomic actions
- **Gap:** Smaller community, no sandbox isolation, less sophisticated agent loops

## Goose

- **Type:** Open Source (Apache 2.0)
- **Stars:** 41K
- **GitHub:** https://github.com/block/goose (also https://github.com/aaif-goose/goose)

The general-purpose AI agent framework from Block that Stripe forked in late 2024 to build Minions. Now maintained by the Agentic AI Foundation (AAIF) under the Linux Foundation.

### Architecture

- **Rust core** — Native desktop, CLI, and API interfaces
- **MCP-native** — 70+ tool extensions via Model Context Protocol
- **15+ LLM providers** — Anthropic, OpenAI, Google, Ollama, and more
- **General purpose** — Code, research, writing, automation, data analysis

### Key Properties

- Minions ancestor — Stripe's Minions were literally built from a Goose fork
- Linux Foundation — Transitioned from Block to AAIF for community governance
- **Gap:** Interactive, not unattended. No sandbox isolation, CI loops, or blueprint orchestration

## Mastra

- **Type:** Open Source (Apache 2.0 + Enterprise)
- **Stars:** 22.9K
- **GitHub:** https://github.com/mastra-ai/mastra
- **Origin:** YC W25, from the team behind Gatsby

A TypeScript framework for building AI-powered applications and autonomous agents. Mastra provides the building blocks for production agent systems — model routing, workflow orchestration, memory, and MCP support — in a developer-friendly package.

### Architecture

- **Model routing** — Unified interface to 40+ LLM providers (OpenAI, Anthropic, Gemini, etc.)
- **Workflow engine** — Graph-based orchestration with `.then()`, `.branch()`, `.parallel()` API
- **Agent system** — Autonomous agents that reason through goals and select tools
- **Human-in-the-loop** — Pause agents for user approval with persistent state across suspension
- **Memory** — Conversation history, working memory, and semantic memory for coherent behavior

### Key Properties

- TypeScript-native — 99.3% TypeScript, integrates with React, Next.js, Node.js
- MCP servers — Author and consume MCP tools via standard interfaces
- Evaluations — Built-in eval framework for measuring agent quality
- Production-ready — Observability, error handling, state persistence
- **Role in agentic engineering:** Mastra is a framework for building custom agent systems, not a pre-built coding agent. Teams would use it to build their own Minions-like system in TypeScript, with the workflow engine serving a similar role to Stripe's blueprints.

## OpenClaw

- **Type:** Open Source
- **Stars:** 355K (fastest-growing open-source project on GitHub)
- **GitHub:** https://github.com/openclaw/openclaw
- **Origin:** Created by Peter Steinberger (Austria), originally named Clawdbot (Nov 2025)

A self-hosted personal AI assistant platform that connects LLMs to real software via messaging platforms. Not a coding agent per se, but a general-purpose agent framework that can execute coding tasks among many other capabilities.

### Architecture

- **Local-first Gateway** — WebSocket-based control plane running locally, coordinating all connections
- **Multi-channel** — WhatsApp, Telegram, Slack, Discord, Signal, Teams, Matrix, and 15+ more messaging platforms
- **Skills platform** — Bundled, managed, and workspace-level skills for extensibility
- **Agent-to-agent coordination** — Session tools for multi-agent communication
- **Device nodes** — macOS, iOS, Android companion apps with system access
- **Browser control** — Dedicated Chrome instance for web automation

### Key Properties

- Self-hosted — Runs entirely on your infrastructure, privacy-first
- Messaging-native — Use your existing chat platforms as the interface (like Stripe uses Slack)
- Voice capabilities — Wake words, continuous voice mode, ElevenLabs integration
- A2UI (Agent-to-UI) — Live Canvas for agent-driven visual workspaces
- NemoClaw — Nvidia-built security add-on with OpenShell sandboxing (released March 2026)
- **Role in agentic engineering:** OpenClaw's messaging-platform integration mirrors how Stripe engineers invoke minions from Slack. Its self-hosted nature and multi-agent coordination make it a potential foundation for building an agentic engineering workflow, though it requires more custom configuration than purpose-built coding agents. The skills platform and agent-to-agent tools could power a Minions-like system where coding tasks are dispatched through familiar messaging channels.

## Claude Managed Agents

- **Type:** Commercial / Managed Service (Public Beta)
- **Launched:** April 8, 2026
- **Vendor:** Anthropic
- **Docs:** https://platform.claude.com/docs/en/managed-agents/overview
- **Pricing:** Model tokens + $0.08 per agent runtime hour
- **Early adopters:** Notion, Rakuten, Asana

Anthropic's vertically integrated agent platform. Bundles the agent harness, sandboxed container, built-in tools, memory, and state persistence into a REST API — eliminating the need to build your own agent loop, tool execution layer, or runtime.

### Architecture

Claude Managed Agents is built around four concepts:

- **Agent** — The model, system prompt, tools, MCP servers, and skills (created once, referenced by ID across sessions)
- **Environment** — A configured container template with pre-installed packages (Python, Node.js, Go, etc.), network access rules, and mounted files
- **Session** — A running agent instance within an environment, performing a specific task and generating outputs
- **Events** — Messages exchanged between your app and the agent (user turns, tool results, status updates), streamed via Server-Sent Events

### Built-In Tools

- **Bash** — Run shell commands in the container
- **File operations** — Read, write, edit, glob, grep
- **Web search and fetch** — Search the web and retrieve content from URLs
- **MCP servers** — Connect to external tool providers

### Key Properties

- **Long-running autonomy** — Agents can run for hours in the cloud without human interaction
- **Stateful sessions** — Persistent file systems and conversation history across multiple interactions
- **Built-in prompt caching and compaction** — Performance optimizations baked into the harness
- **Steerable mid-execution** — Send additional user events to guide or interrupt the agent
- **Research-preview features** — Outcomes, multi-agent, and memory capabilities (gated access)
- **Rate limits** — 60 create requests/min and 600 read requests/min per organization

### Why This Is a New Category

Claude Managed Agents represents a fundamentally new market layer (see [Sandboxes: Market Structure](sandboxes.md#the-sandbox-market-structure) for the four-layer model). Where previous agent platforms required you to assemble inference + sandbox + harness + memory separately, Claude Managed Agents bundles all four into a single API — with the model provider as the operator.

This is disruptive to the Layer B agent-sandbox market: teams that would have used E2B + LangGraph + Pinecone + their own loop can now make one API call instead. The trade-off is vendor lock-in: moving off Claude Managed Agents to a self-built stack requires re-implementing session management, memory, tool execution, and sandbox lifecycle.

### When to Pick Claude Managed Agents

- You want the fastest time-to-market for a coding or task agent
- Your workflow is a good fit for the built-in tools (bash, file ops, web search, MCP)
- You don't need GPU-heavy execution (not exposed)
- You're OK with multi-tenant SaaS (not for heavily regulated data)
- You don't need custom branching / tree-search / best-of-N semantics

### When to Pick Something Else

- You need specialized branching semantics → [Contree](sandboxes.md#contree--the-git-native-sandbox)
- You need GPU in the sandbox → Modal, Daytona, Northflank
- You need enterprise VPC → Northflank, Runloop, or self-hosted
- You're building an agent infrastructure product → Layer B sandbox + custom harness

### Related Offerings

- **Messages API** — Direct model access for custom agent loops with full control
- **Claude Code** — Anthropic's own coding agent using the harness internally
- **Claude Cowork** — Enterprise collaboration tier with managed agents

---

## Vercel Open Agents

- **Type:** Open Source Template (MIT)
- **Stars:** 3.7K (396 forks)
- **GitHub:** https://github.com/vercel-labs/open-agents
- **Demo:** https://open-agents.dev
- **Template:** https://vercel.com/templates/template/open-agents

Vercel's reference architecture for building cloud coding agents. Open Agents is not a hosted product — it's a forkable, customizable MIT-licensed template that ships a complete cloud agent system: web UI, durable workflow runtime, sandbox orchestration, and GitHub App integration. Deploy it to Vercel in minutes, then modify it to fit your use case.

### Architectural Principle: "The Agent Is Not the Sandbox"

The most important design decision in Open Agents: the agent executes **outside** the sandbox, not within it. The agent runs as a durable workflow on Vercel's Workflow SDK. The sandbox is only the execution environment for code the agent wants to run.

This separation matters because:

- **Agent execution decouples from request lifecycles** — Chat turns can span many persisted workflow steps that survive request timeouts
- **Sandbox hibernates and resumes independently** — Sandbox goes to sleep without killing the agent
- **Model/provider flexibility** — Swap models without touching the sandbox
- **Sandbox stays single-purpose** — It's an execution environment, not a control plane

### Three-Layer Architecture

1. **Web Layer** — Next.js app handling auth, sessions, chat UI, streaming. Built on Vercel AI SDK + Chat SDK.
2. **Agent Workflow** — Durable workflow execution via Vercel Workflow SDK. Streaming, cancellation, persistent state across multi-step runs. Reconnectable streams.
3. **Sandbox VM** — Vercel Sandbox (Firecracker microVM) with filesystem, shell, git, dev servers. Exposes ports 3000, 5173, 4321, 8000. Snapshot-based resume. Hibernates after inactivity.

### Repo Structure

```
apps/web         — Next.js, workflows, auth, chat UI
packages/agent   — agent loop, tools, subagents, skills
packages/sandbox — sandbox abstraction + Vercel integration
packages/shared  — utilities
```

### Agent Capabilities

- **Tool suite** — File read/write/edit, grep/glob search, shell commands, task management, web fetch, skill invocation
- **Skills system** — Modular agent skills in `.agents/skills` with a `skills-lock.json` for versioning (compatible with [vercel-labs/skills](https://github.com/vercel-labs/skills) `npx skills`)
- **Subagents** — Multi-agent coordination built in
- **Repo cloning** — Clone any GitHub repo into the sandbox, work on branches
- **Auto-commit / auto-PR** — Optional, preference-driven (not always on). Can open PRs with summaries.
- **Session sharing** — Read-only share links for audit/review
- **Voice input** — ElevenLabs transcription for spoken commands
- **MCP tool support** — Connect external tools via Model Context Protocol

### Stack

- **Frameworks:** Next.js, Tailwind CSS
- **SDKs:** Vercel Workflow SDK, Vercel AI SDK, Vercel Chat SDK
- **Database:** PostgreSQL (required) — works with Neon by default
- **Cache:** Redis/Upstash KV (optional, for metadata)
- **Package manager:** Bun (local dev)
- **Runtime:** 99.3% TypeScript

### Deployment Environment Variables

- **Minimum:** `POSTGRES_URL`, `JWE_SECRET`
- **Recommended:** `ENCRYPTION_KEY` + Vercel OAuth credentials
- **Full-featured:** GitHub App (ID, client secret, private key, webhook secret)
- **Optional:** Redis/KV, ElevenLabs API, custom sandbox snapshots

### GitHub App Integration

Uses the GitHub App's user authorization flow:
- Repository access via installation
- Private repo cloning
- Branch pushing
- PR creation with automated summaries
- Webhook events for status updates

Organization-level installations require the app to be public.

### Why This Matters

Open Agents is significant because it codifies a production-ready cloud agent architecture in an MIT-licensed template. Teams that would otherwise spend weeks assembling a web UI + durable workflow + sandbox + GitHub integration can fork Open Agents and customize it. It's the "reference implementation" for the Vercel Agents platform (AI Gateway + Workflow + Sandbox) and a pragmatic starting point for building Claude Managed Agents / Stripe Minions-style systems on Vercel infra.

### When to Pick Open Agents

- You want a production-ready starting point instead of building from scratch
- You're already on Vercel or want to be
- You want full control over the agent harness (unlike Claude Managed Agents)
- You want the "agent outside the sandbox" architectural pattern
- You need durable multi-step workflows with streaming
- You want GitHub App integration out of the box

### When to Pick Something Else

- Fastest time-to-market with zero infra → [Claude Managed Agents](approaches.md#claude-managed-agents)
- Tree-search / branching-heavy workflows → [Contree](sandboxes.md#contree--the-git-native-sandbox) + custom harness
- Non-Vercel deployment target → AgentField or a custom stack
- Heavy GPU requirements → Modal-based harness instead

### Related Vercel Agent Products

Open Agents is the community template. Vercel also ships a broader **Vercel Agents** platform that includes:

- **AI Gateway** — Unified endpoint for model routing, provider failover, embeddings (see [Inference](inference.md#routing--gateway-solutions))
- **Vercel Sandbox** — Firecracker microVM execution (see [Sandboxes](sandboxes.md#purpose-built-agent-sandboxes))
- **Vercel Workflow SDK** — Durable execution primitives
- **Vercel AI SDK** — TypeScript toolkit for streaming, tool use, structured outputs
- **Vercel Agent** — Stack-aware agent for the Vercel platform itself

Open Agents stitches these together into a reference application — it's both a product demonstration and a production-ready template.

## OpenAI Symphony

- **Type:** Open Source (Apache 2.0)
- **Stars:** 15K+
- **GitHub:** https://github.com/openai/symphony
- **Origin:** OpenAI, released as engineering preview
- **Reference:** https://www.latent.space/p/harness-eng

Symphony transforms project work into isolated, autonomous implementation runs. Rather than supervising coding agents, teams manage work at a strategic level — agents autonomously complete tasks, collect proof of work, and manage PR lifecycles.

### Architecture

Symphony has a 6-layer architecture built on Elixir/BEAM:

- **Policy layer** — Enforcement rules (e.g., "CI must pass before merge")
- **Configuration layer** — Environment setup and agent provisioning
- **Coordination layer** — Work distribution, task queuing, agent assignment
- **Execution layer** — Agent runtime with isolated worktrees per task
- **Integration layer** — External system connections (Linear, GitHub, Slack)
- **Observability layer** — Tracing, metrics, logging across all agent activity

### Key Properties

- **Work queue monitoring** — Watches task boards (e.g., Linear) and spawns agents for new assignments
- **Proof of work** — Agents produce CI status, PR feedback, complexity metrics, and walkthrough videos
- **Rework state** — If a PR isn't mergeable, trash the worktree and restart from scratch
- **Daily improvement loops** — Agents analyze session logs to identify areas for improvement
- **Self-ticketing** — Agents cut their own follow-up tickets
- **Spec-driven** — Distributed as a formal specification (SPEC.md) that teams implement in any language
- **Elixir reference implementation** — BEAM runtime chosen for process supervision, gen servers, and resumability
- **Human role shift** — From code review to 1-2x daily yes/no decisions on batched PRs

### Harness Engineering Context

Symphony assumes codebases have adopted "harness engineering" — robust test suites, CI/CD, and safety mechanisms that give agents the feedback loops they need. It represents the next evolution: from agent supervision to work-level management.

### Results (from Latent Space interview)

- 1M+ lines of code, 1,500+ PRs, zero manually written code over 5 months
- Team of 3 managing output equivalent to much larger teams
- Before GPT-5.2: 3.5 PRs/engineer/day; after: 5-10 PRs/engineer/day
- 500 NPM packages in codebase (described as "10,000 engineer level architecture")

---

## Rivet Sandbox Agent

- **Type:** Open Source
- **Stars:** 1.3K
- **GitHub:** https://github.com/rivet-dev/sandbox-agent

Universal HTTP API to run any coding agent (Claude Code, Codex, OpenCode, Amp) in isolated sandboxes. The infrastructure layer for building a Minions-like system.

### Architecture

- **Universal agent API** — Single HTTP interface for any coding agent
- **Multi-runtime** — E2B, Daytona, Modal, Docker support
- **Session management** — Persistent sessions with event streaming
- **Audit logging** — Full audit trail for compliance

### Key Properties

- Devbox equivalent — Best open-source match for Stripe's sandbox infrastructure
- Composable — Combine with any agent and orchestrator
- **Gap:** Infrastructure layer only, not a complete autonomous agent

# Architectural Patterns in Agentic Engineering

Cross-cutting patterns that appear across the different approaches to autonomous coding agents. Understanding these patterns helps you evaluate tools and design your own agentic systems.

---

## 0. Harness Engineering

The overarching discipline that ties all other patterns together. Coined in the context of OpenAI's Symphony project, harness engineering is the practice of building the infrastructure, feedback loops, and encoded knowledge that make autonomous agents productive.

**Reference:** https://www.latent.space/p/harness-eng

### Core Thesis

The fundamental insight: the scarcest resource is synchronous human attention. Everything else — code, tests, PRs — can be parallelized across agents. Software must be written for agent legibility as much as human readability.

### Key Principles

- **Code is context, code is prompts** — Agent behavior improves with codebase consistency. Write code that agents can reliably parse and modify.
- **Encode all requirements as text** — Non-functional requirements, coding standards, architectural decisions — everything must exist as context agents can consume (rule files, specs, tests, docs).
- **When agents fail, ask what's missing** — Don't blame the model. Ask: what capability, context, or structure would have prevented this failure? Then build it.
- **One-minute build loops** — Impose hard constraints on feedback speed. If the build takes longer than a minute, decompose further.
- **Observability-first** — Spawn metrics, traces, and logging infrastructure before writing application code. Agents need to see what's happening.
- **Code is disposable** — Treat code as ephemeral context, not permanent artifact. Worktrees are cheap, merge conflicts are trivial for agents, dependencies can be inlined in an afternoon.

### Spec-Driven Software ("Ghost Libraries")

Distribute software as detailed specifications rather than implementations:

1. Create a high-fidelity spec
2. Spawn disconnected agents to implement against the spec
3. Review implementations against upstream
4. Iterate

This enables agents to reproduce complex systems locally without importing fragile dependency chains.

### Skills as Encoded Engineering Taste

Not traditional agent skills — domain-specific primitives that encode your team's engineering judgment:

- **Tech Tracker** — Markdown table for business logic guardrails
- **Quality Score** — Markdown-based assessment hooks
- **Review Agents** — Check code against documented standards with priority frameworks (P0-P2)

Each skill provides tracing and metrics automatically. Skills determine when to invoke themselves (agent discretion, not forced).

### The Human Role Shift

From: Individual contributor writing code.
To: Systems thinker optimizing agent productivity.

- Focus on "where are agents making mistakes?"
- Build abstractions to unblock agents
- Move higher up the stack as models improve
- Review 1-2x daily (yes/no decisions on batched PRs), not line-by-line

---

## 1. Isolation Strategies

How agents are sandboxed from production and from each other.

| Strategy | Used By | Pros | Cons |
|----------|---------|------|------|
| **EC2 Devboxes** | Stripe Minions | Full OS isolation, identical to human env, pre-warmed in ~10s | Expensive, AWS-specific |
| **Docker Containers** | OpenHands, SWE-agent | Lightweight, reproducible, widely supported | Less isolation than VMs, image management |
| **Git Worktrees** | AgentField | Zero overhead, native git, parallel branches | No process isolation, shared filesystem |
| **Cloud Sandboxes** | Open SWE, Rivet | Scalable, provider-agnostic | Latency, cost, network dependency |
| **Local Execution** | Goose, Aider, OpenCode | Fast, no setup cost | No isolation, risk to local state |

### Key Insight

Stripe chose EC2 devboxes because git worktrees "wouldn't scale at Stripe." But for most teams, worktrees or Docker provide sufficient isolation at far lower cost. The right choice depends on codebase size, security requirements, and parallelization needs.

### Sub-Pattern: Agent Outside the Sandbox

A secondary architectural decision, independent of isolation tech: **where does the agent loop itself run, relative to the sandbox it controls?**

- **Agent inside sandbox** — The LLM call, tool dispatcher, and sandbox share a lifecycle. Simple to build, but the sandbox is both the execution environment AND the control plane. If the sandbox dies, the agent dies.
- **Agent outside sandbox** — The agent runs as a durable workflow in a separate compute layer and calls into the sandbox via tools (file read/edit, shell, search). The sandbox is pure execution; the agent is pure orchestration.

[Vercel Open Agents](approaches.md#vercel-open-agents) is the canonical example of the "agent outside" pattern. Its principle: *"The agent is not the sandbox."* Benefits:

- Agent survives sandbox hibernation — sandbox sleeps, agent keeps state
- Chat turns span many workflow steps that survive request timeouts
- Model/provider swaps don't touch the sandbox
- Sandbox stays single-purpose (code execution), not a control plane

Stripe Minions takes the opposite approach: the agent lives inside the devbox because the devbox is long-lived and pre-warmed. Both work — the trade-off is between sandbox lifecycle independence (agent outside) and simplicity (agent inside).

---

## 2. Orchestration Models

How agent execution is structured — the balance between deterministic steps and LLM creativity.

### Blueprints (Stripe Minions)

Hybrid state machines with two node types:
- **Deterministic nodes** — Run linters, push code, manage git (always execute the same way)
- **Agentic nodes** — Implement features, fix CI failures (LLM decides how)

This ensures required steps always happen while giving the LLM freedom where it matters.

### Patchflows (Patchwork)

Reusable workflow templates combining atomic actions with LLM prompts:
```
AutoFix: detect_issue → prompt_llm → apply_patch → run_lint → commit → create_pr
```

### LangGraph (Open SWE)

Graph-based orchestration where nodes are agents with defined inputs/outputs:
```
Manager → Planner → Programmer → Reviewer → PR
```

### Multi-Agent Teams (OhMyOpenAgent)

Named specialist agents with distinct roles:
```
Sisyphus (orchestrator) → Hephaestus (deep worker) + Prometheus (planner) + Oracle (debugger)
```

### Free-Form Agent Loop (OpenHands, SWE-agent)

Single agent loop with tools and no predefined workflow. The LLM decides what to do at each step.

### Key Insight

More structured orchestration (blueprints, patchflows) trades flexibility for reliability. Free-form loops are more adaptable but harder to debug and less predictable. The trend is toward hybrid approaches.

---

## 3. Context Management

How agents acquire the knowledge they need to work on a codebase.

### MCP (Model Context Protocol)

Standardized protocol for providing LLMs with tools and context. Used by Stripe (Toolshed, ~500 tools), Goose (70+ extensions), and increasingly the whole ecosystem.

**Key pattern: Curated subsets** — Stripe doesn't give minions all 500 tools. Each run gets a curated subset to prevent tool explosion in the context window.

### Rule Files

Agent-readable instruction files (like `.cursorrules`, `AGENTS.md`, `CLAUDE.md`) that provide codebase-specific guidance.

**Key pattern: Conditional rules** — Almost all of Stripe's agent rules are applied based on subdirectory, not globally. This prevents context bloat from irrelevant instructions.

### Pre-Hydration

Running deterministic context-gathering before the agent loop starts:
- Parse URLs from the task description
- Fetch linked tickets, docs, PRs
- Run code intelligence queries
- Build initial context package

**Key pattern:** Stripe runs relevant MCP tools over likely-looking links before a minion run even starts.

### Hierarchical Context (OhMyOpenAgent)

Auto-generated `AGENTS.md` files at each directory level, providing agents with context that's scoped to their current working area rather than the entire repo.

---

## 4. Feedback Loops

How agents learn from failures and iterate toward success.

### The Shift-Left Principle

Catch failures as early and cheaply as possible:

```
Local Lint (~1s) → Local Tests (~5s) → CI Tests (~minutes) → Human Review
```

Stripe's approach: local executable with heuristic-selected lints runs on each git push in under 5 seconds. Any lint that would fail in CI should be enforced locally.

### Iteration Caps

Most systems cap the number of retry cycles to avoid burning tokens on diminishing returns:

| System | Local Retries | CI Rounds | Total Cap |
|--------|--------------|-----------|-----------|
| Stripe Minions | Unlimited local lint | 2 max | ~3 iterations |
| AgentField | 5 per issue | Gate-controlled | Escalates to replanner |
| OpenHands | Tool-based | Iterates until pass | No hard cap |
| OhMyOpenAgent | Ralph Loop | N/A | Until completion |

### Auto-Fixes

Stripe's CI tests often include auto-fixes for common failures. When a test fails, the fix is automatically applied before the agent even tries to fix it manually. This dramatically reduces wasted LLM cycles.

---

## 5. Failure Recovery

What happens when things go wrong — the strategies beyond simple retry.

### Simple Retry (Most agents)

Run the same task again, possibly with the error message as additional context.

### Typed Recovery (AgentField)

Structured recovery actions based on failure type:
- **Retry modified** — Same task, different approach
- **Retry with different approach** — Explicitly change strategy
- **Split issue** — Break the failing task into smaller subtasks
- **Accept with debt** — Mark as known gap, let downstream agents work around it
- **Escalate** — Send to human or higher-level agent

### Three Nested Loops (AgentField)

```
Inner Loop: Per-issue retries (up to 5 iterations)
    ↓ failure
Middle Loop: Issue advisor selects recovery action
    ↓ cascading failures
Outer Loop: Replanner restructures remaining work
```

### Checkpoint-Based Recovery

AgentField saves state at every level boundary. A build failing at invocation 140 resumes from that point rather than restarting from scratch.

[Contree](https://contree.dev) takes this further with Git-like branching at the sandbox level — agents can checkpoint the entire environment, fork to try multiple approaches, and roll back to any prior state without re-execution. This enables *tree-of-thought sandboxing*: fork at each decision point, run parallel branches to evaluate, then continue with the winner. See [Infrastructure](infrastructure.md#contree--git-native-sandbox-for-agents) for details.

### Key Insight

The sophistication of failure handling is often the biggest differentiator between toy agents and production systems. Stripe's 2-CI-round cap is deceptively simple but reflects a pragmatic insight: there are diminishing marginal returns for an LLM to run many rounds of a full CI loop.

---

## 6. Multi-Agent Coordination

How parallel agents avoid stepping on each other.

### Git Worktree Isolation (AgentField)

Each issue operates in its own git worktree with its own branch. No lock contention between parallel agents.

### Intent-Aware Merging (AgentField)

When multiple issues modify the same files, a merger agent performs conflict resolution that understands the intent of each change, not just the text diff.

### Task Decomposition (Composio)

A planner agent breaks work into independent subtasks, distributes them to worker agents, then merges results.

### Devbox Isolation (Stripe)

Each minion gets its own full development environment. No shared filesystem, no merge conflicts during execution. Conflicts are handled at PR time by human reviewers.

### Key Insight

Stripe chose to avoid merge conflicts entirely by isolating at the VM level and letting humans handle PR-level conflicts. AgentField chose to embrace parallelism and build automated merge resolution. The right choice depends on how independent your tasks are.

# Agentic Organizations

How companies and teams organize around autonomous coding agents. The shift from "developers who use AI tools" to "organizations designed for human-agent collaboration."

---

## The Stripe Model

Stripe represents the most mature example of an agentic engineering organization.

### How It Works

- Engineers use minions as a normal part of their workflow, invoking them from Slack threads
- Multiple minions run in parallel, especially useful during on-call rotations
- Internal platforms (docs, feature flags, ticketing) all integrate with minions
- CI systems auto-create tickets suggesting minion fixes for flaky tests
- Human role shifts from "writing code" to "reviewing agent-produced PRs"

### Key Organizational Principles

1. **Same tools for humans and agents** — Developer productivity investments benefit both. If tooling is good for humans, it's good for LLMs too.
2. **Shift feedback left** — Any lint that would fail in CI should be enforced in IDE or on push. Fast feedback benefits agents even more than humans.
3. **Conditional rules, not global rules** — Scoping agent instructions by subdirectory prevents context bloat and makes rules maintainable.
4. **Pre-hydrate context** — Don't make agents discover context through exploration. Gather it deterministically before the agent loop.
5. **Cap CI iterations** — Diminishing returns on LLM CI loops. Often one, at most two rounds.

### Scale

- 1,300+ PRs merged per week with no human-written code
- Hundreds of millions of lines of code
- Primarily Ruby (not Rails) with Sorbet typing
- Handles >$1 trillion/year in payment volume

---

## The Open-Source / Startup Model

For teams without Stripe's resources, the open-source ecosystem provides composable alternatives.

### Typical Setup

1. **Agent selection** — Choose a core agent (OpenHands, Claude Code, OpenCode) based on model preference and deployment model
2. **Sandbox infrastructure** — Docker, E2B, or Rivet for isolation
3. **Trigger integration** — GitHub Actions, Slack bots, or CLI for invocation
4. **Rule files** — CLAUDE.md, AGENTS.md, or .cursorrules for codebase context
5. **CI integration** — Connect agent output to existing CI/CD pipeline

### Key Differences from Enterprise

| Aspect | Enterprise (Stripe) | Open Source / Startup |
|--------|--------------------|-----------------------|
| Isolation | Dedicated EC2 devboxes | Docker / worktrees / cloud sandboxes |
| Context | Centralized MCP server (Toolshed) | Distributed rule files + ad-hoc MCP |
| Scale | 1,300+ PRs/week | Dozens to hundreds of agent runs |
| Integration | Deep internal platform integration | GitHub Actions / Slack bots |
| Orchestration | Custom blueprints | LangGraph / patchflows / free-form |
| Investment | Dedicated platform team | Part of existing DevEx effort |

---

## Organizational Patterns

### Pattern 1: Agent as Team Member

Agents are treated like junior developers. They receive tasks, produce PRs, and their work is reviewed by humans.

- **Best for:** Well-defined tasks (bug fixes, migrations, dependency updates)
- **Human role:** Task creation, code review, architectural decisions
- **Used by:** Stripe, teams using OpenHands or SWE-agent

### Pattern 2: Agent Swarm

Multiple agents work in parallel on decomposed subtasks, with automated coordination.

- **Best for:** Large refactors, multi-file changes, migration campaigns
- **Human role:** High-level planning, final review, conflict resolution
- **Used by:** Teams using Composio, AgentField, or OhMyOpenAgent

### Pattern 3: Agent-Assisted On-Call

Agents handle routine on-call tasks (flaky tests, simple bug fixes, config changes) while humans focus on complex incidents.

- **Best for:** Reducing on-call toil, handling alert-driven work
- **Human role:** Triage, complex debugging, incident response
- **Used by:** Stripe (explicitly mentioned as a key use case)

### Pattern 4: Agent-First Development

The default path for new code is agent-generated. Humans design systems and review output.

- **Best for:** Greenfield features with clear specifications
- **Human role:** Architecture, specification, review
- **Emerging at:** Companies with high agent PR merge rates

---

## The Infrastructure You Need

Regardless of which approach you take, certain infrastructure investments unlock agentic engineering:

### Must Have

- **Fast CI** — Agents iterate against tests. Slow CI means expensive, slow agent runs.
- **Good test coverage** — Agents need feedback signals. No tests = no feedback loop.
- **Linting with auto-fix** — Catches formatting/style issues without burning LLM tokens.
- **Clear coding standards** — Rule files and documentation that agents can consume.

### Should Have

- **Sandbox/isolation** — Prevents agents from affecting production or each other.
- **MCP tools** — Standardized context access for docs, tickets, code intelligence.
- **CI auto-fixes** — Automatically apply known fixes before sending failures back to agents.

### Nice to Have

- **Pre-warmed environments** — Reduces agent startup time from minutes to seconds.
- **Conditional rule files** — Scoped instructions prevent context window waste.
- **Agent observability** — Dashboards showing agent decisions, actions, and outcomes.
- **Cost tracking** — Token and compute costs per agent run for optimization.

---

## The Future

The industry is converging on a model where:

1. **Agents handle the implementation** — From task description to passing PR
2. **Humans handle the judgment** — Architecture, priorities, review, and edge cases
3. **Infrastructure bridges the gap** — Isolation, feedback loops, and context management make agent-produced code reliable enough to merge

The key insight from both Stripe and the open-source community: **the hard part isn't the LLM — it's the infrastructure around it.** Isolation, feedback loops, failure recovery, context management, and CI integration are what separate toy demos from production systems.

# Inference Solutions for Agentic Engineering

Agents need fast, reliable access to capable LLMs. The choice of inference provider affects cost, latency, model selection, and reliability — and because LLM API costs typically comprise 60-80% of agent operating expenses, inference strategy is often the single most consequential infrastructure decision.

---

## Direct API Providers

The model developers themselves, offering first-party API access.

| **Google** | Gemini 2.5 Pro/Flash | 1M+ context window, multimodal, competitive pricing | Per-token |

## Nebius AI Cloud — Standout Platform

Worth highlighting separately: [Nebius](https://nebius.com) is emerging as one of the most compelling infrastructure choices for agentic engineering at scale. Their AI Cloud 3.5 platform (launched March 2026) combines several capabilities that are particularly well-suited to agent workloads:

- **GPU breadth** — Access to the latest NVIDIA accelerators (GB300 NVL72, GB200 NVL72, B300, B200, H200, H100, L40S) from single GPUs to thousands in one cluster.

- **Native integrations** — Drop-in replacement for proprietary endpoints. Native compatibility with LangChain and LlamaIndex.
- **Zero-error validated configs** — Production-validated configurations mean less time debugging infrastructure and more time building agent capabilities.

For teams running self-hosted models as part of a tiered inference strategy, Nebius offers the best combination of raw performance, operational simplicity, and cost transparency. The serverless Token Factory is ideal for variable agent workloads that spike during parallel execution, while dedicated GPU clusters serve sustained high-throughput needs.

---

## Routing & Gateway Solutions

## Self-Hosted Inference

Running models on your own infrastructure for maximum control, privacy, and cost optimization at scale.

## Inference Strategy for Agents

Most production agent systems use a **tiered inference strategy**:

1. **Routing/classification** — Cheap, fast models (Haiku, GPT-4.1-mini, Flash) for deciding what to do
2. **Implementation** — Capable models (Sonnet, GPT-4.1, Gemini Pro) for writing code
3. **Complex reasoning** — Top-tier models (Opus, o3) for architectural decisions and difficult bugs
4. **Verification** — Mid-tier models for code review and test analysis

This mirrors OhMyOpenAgent's multi-model routing (visual, reasoning, quick fix, ultrabrain) and AgentField's `.ai()` vs `.harness()` primitives.

### Cost Optimization Through Model Routing

LLM API costs dominate agent operating expenses (typically 60-80% of total cost). Platforms that intelligently route simple tasks to lower-cost models while reserving premium models for complex reasoning address the dominant cost driver in agent operations. Early adopters report order-of-magnitude reductions in inference costs through intelligent routing — Coral claims approximately 10x cost reduction through this approach.

Expect automatic model routing to become table stakes for managed platforms within 12 months.

### Key Insight

**Architecture quality matters more than model capability.** AgentField scored 95/100 with both Claude Haiku and MiniMax M2.5 because verification loops and escalation hierarchies compensate for model limitations through iteration. Choose your inference strategy based on cost-per-useful-output, not raw model benchmarks.

| Budget-constrained? | Haiku/Flash for routing + Sonnet for coding | Opus/GPT-4.1 for everything |

See also: [Hosting & Execution](infrastructure.md) for where to actually run your agents.

# Sandboxes for Agentic Engineering

Sandboxes are the single most important piece of infrastructure for autonomous coding agents. They answer the fundamental question: **where does untrusted LLM-generated code actually run?**

Everything else — inference, orchestration, memory, observability — depends on the sandbox layer being correct, fast, and safe.

---

## Why Sandboxes Matter for Agents

An autonomous agent that writes code will, at some point, produce code that is wrong, malicious (via prompt injection), or dangerous (infinite loops, resource exhaustion, file system damage). Without a sandbox, these failures corrupt the host environment and, at worst, leak credentials or attack other systems.

A well-designed sandbox gives agents four critical affordances:

1. **Safe execution** — Run unreviewed code without affecting production, the host, or other tenants
2. **Reproducibility** — Spin up identical environments deterministically for parallel or repeated runs
3. **State management** — Checkpoint, fork, and roll back environment state
4. **Observability** — Capture logs, metrics, and I/O for post-hoc analysis

The quality of these affordances — especially state management and isolation — is what separates toy sandboxes from production agent infrastructure.

---

## The Sandbox Market Structure

The sandbox layer divides into four tiers, and which tier you operate at determines your design tradeoffs.

**Layer A — Primitives.** The underlying isolation technology: Firecracker, gVisor, Kata Containers, libkrun. Hyperscaler-dominated, stable, open source.

**Layer B — Agent-Sandbox Platforms.** Managed services built on Layer A primitives: E2B, Contree, Daytona, Modal, Sprites.dev, Runloop, Northflank, Scrapybara, Steel.dev. This is where almost all buying decisions happen for agent teams building their own harnesses.

**Layer C — Embedded in Agent Products.** Sandboxes that ship inside a broader agent product: Cursor's background agents, Devin's workspaces, Copilot Workspace, Replit Agent. These are rarely bought standalone — they're a feature of the agent product.

**Layer D — Model-Provider Managed Agents.** Vertically integrated offerings from the model provider itself that bundle harness, sandbox, tools, and state into one managed service. The newest tier and a significant market disruption:

- **[Claude Managed Agents](https://platform.claude.com/docs/en/managed-agents/overview)** (Anthropic, launched April 8, 2026) — REST APIs bundling agent loop + tool execution + sandbox container + state persistence. Pricing is model tokens + $0.08 per agent runtime hour. Runs for hours autonomously. Early adopters include Notion, Rakuten, and Asana.

Layer D collapses what used to be a stack (Claude model + E2B sandbox + LangGraph harness + Pinecone memory) into a single API call. For many teams, this eliminates the Layer B buying decision entirely — you get sandbox, harness, and tools bundled with your inference.

**The market dynamic:**

- Layer C is consolidating around a handful of agent products, which means Layer B's addressable market shifts toward fewer, larger customers
- Layer D's arrival accelerates this: teams that would have assembled their own stack increasingly pick the model provider's managed offering for speed
- Layer B vendors are increasingly specializing on specific use cases (tree-search, SWE-bench, GPU-heavy workloads) that Layer D doesn't serve as well
- Sales motion shifts from product-led growth to enterprise / infrastructure partnerships

**When each layer makes sense:**

| You are building... | Best layer | Why |
|--------------------|-----------|-----|
| A novel agent architecture (tree-search, RL, multi-agent) | Layer B | You need control over branching, state, orchestration |
| A standard coding / task agent | Layer D | Fastest time-to-market, no infra to build |
| An infra product for other agent builders | Layer B (sandbox) + custom harness | You're selling the harness — don't outsource it |
| A GPU-heavy agent (vision, local models) | Layer B (Modal, Northflank) | Layer D typically doesn't expose GPU |
| A regulated-data agent | Layer B (VPC) or self-hosted | Layer D is multi-tenant SaaS |
| A tool inside your existing product | Layer D or Layer B | Depends on customization needs |

**Vendor lock-in trade-off:** Layer D gives you speed at the cost of portability. Moving from Claude Managed Agents to a self-built harness is non-trivial once you've depended on its session model, memory, and tools. Layer B + custom harness gives you portability at the cost of weeks of integration work.

---

## Core Use Cases

### 1. Code Execution & Testing

The baseline. Agent writes code → sandbox runs it → agent sees stdout/stderr/exit code and iterates.

- **Best for:** SWE-bench-style task completion, test-driven development loops, script execution
- **Required:** Fast cold start (<1s), CLI/shell access, file I/O
- **Example vendors:** E2B, Daytona, Modal, AgentComputer, Contree

### 2. Parallel Exploration (Tree-of-Thought)

Agent forks the environment at a decision point, tries multiple approaches in parallel, evaluates each, and continues with the winner.

- **Best for:** Multi-hypothesis reasoning, exploring alternative implementations, competitive eval
- **Required:** Fast branching/forking, checkpoint/restore, parallel concurrency
- **Example vendors:** Contree (Git-native branching), Sprites.dev (hibernate + fork), Modal (snapshots)

### 3. Rollback on Failure

Agent tries an approach, sandbox observes the failure, agent rolls back entire environment state and tries something different.

- **Best for:** Long-horizon agent runs, destructive operations (migrations, refactors), risk-sensitive tasks
- **Required:** Checkpoint at arbitrary points, instant restore, state preservation across rollback
- **Example vendors:** Contree (Git-like rollback), Sprites.dev (300ms hibernate/restore), AgentField (level boundary checkpoints)

### 4. Persistent Agent Environments

Agent works across multiple sessions in the same environment — files, installed packages, shell history persist between invocations.

- **Best for:** Long-running agent assistants, stateful coding sessions, per-user agent workspaces
- **Required:** Persistent storage, wake-from-sleep, low idle cost
- **Example vendors:** Sprites.dev (indefinite + hibernate), AgentComputer (25 GB persistent), CDEs (Gitpod, Codespaces, Coder)

### 5. Multi-Tenant Agent Fleets

Many agents running concurrently, each isolated from the others, with strict resource limits and no cross-contamination.

- **Best for:** Enterprise agent deployments, SaaS agent platforms, shared agent infrastructure
- **Required:** Hardware-level isolation, VPC support, audit logging, per-tenant scoping
- **Example vendors:** Northflank (enterprise VPC), Runloop (10K+ parallel), Modal (50K+ concurrency)

### 6. Apple-Native Workflows

Agents that interact with iMessage, Xcode, iOS Simulator, or Apple's Neural Engine.

- **Best for:** Mobile app build/test agents, iOS automation, Apple ecosystem tooling
- **Required:** macOS hardware, often Apple silicon (M1-M4)
- **Example vendors:** MacStadium, AWS EC2 Mac, Scaleway Mac (see [Hosting](infrastructure.md#cloud-mac-hosting))

### 7. Coding Agent Dev Environments

A persistent dev environment that hosts a coding agent's entire workflow — similar to Stripe's devbox model.

- **Best for:** Team-shared agent platforms, PR-producing agents, Stripe Minions-style infrastructure
- **Required:** Pre-warmed pools, source code pre-loaded, per-agent isolation
- **Example vendors:** GitHub Codespaces, Gitpod, Coder, Vercel Sandbox, custom EC2 (Stripe's approach)

### 8. SWE-Bench & Agent Evaluation

Running benchmarks like SWE-bench, Bird-SQL, HumanEval, or custom agent harnesses at scale. Each task needs an identical, pre-configured environment — and ideally a way to run thousands in parallel.

- **Best for:** Frontier labs, agent research, model eval pipelines, agent CI/CD across patches
- **Required:** Preloaded environment libraries, fast per-task instantiation, checkpoint/branch primitives
- **Example vendors:** Contree (ships 7,000+ SWE-bench environments as tags), Runloop (SWE-bench focus), Modal (50K+ concurrency)

### 9. Best-of-N Sampling & Tree Search

An agent generates N candidate solutions, runs each in isolation, scores them, and returns the best. Essential for tree-search coding agents and RL training loops.

- **Best for:** Tree-search coding agents, best-of-N generation, Monte Carlo tree search over code
- **Required:** Fast branching from a shared base, cheap parallel sandboxes, result aggregation
- **Example vendors:** Contree (branching-first), Modal (snapshots + concurrency), Sprites.dev (hibernate-based parallelism)

### 10. Latent / Research Use Cases

Emerging use cases that sandbox infrastructure is starting to enable:

- **Training data generation pipelines** — Use branching to generate diverse agent traces for RL training. The branching tree *is* the replay buffer.
- **Reproducibility-as-a-service** — Cite image UUIDs in papers and blog posts; reviewers and readers can reproduce exact environments on demand.
- **Counterfactual debugging** — "What if the agent had done X at step 7?" Fork from a checkpoint, change the action, observe the outcome.
- **Multi-agent coordination & competition** — Fork state, run multiple agents concurrently against the same baseline, evaluate interaction outcomes.
- **Educational sandboxes with visible traces** — Instructors inspect the full attempt tree of a student's agent, not just the final output.
- **Regulatory audit trails** — Environment lineage as an immutable audit artifact for finance/healthcare compliance.

These are largely underexplored today but represent where sandbox infrastructure is heading as agent workflows mature.

---

## Isolation Tiers — The Security Ladder

Sandboxes vary dramatically in how strongly they isolate. Choosing the right tier is a security decision, not a performance decision.

| Tier | Tech | Boundary | Exploit Surface | Use When |
|------|------|----------|----------------|----------|
| **Process Isolation** | chroot, namespaces, Firejail | Same OS, separated process | Kernel syscalls, /proc, shared FS | Dev-only, trusted code, CI with known inputs |
| **Container Isolation** | Docker, Podman | Shared OS kernel | Kernel exploits, container escape | Internal agent use, non-sensitive data |
| **User-Space Kernel** | gVisor | Intercepted syscalls | Smaller syscall surface | Good middle ground for mixed-trust code |
| **Firecracker microVM** | E2B, Sprites.dev, Contree | Dedicated kernel per sandbox | Hypervisor exploits only | Untrusted LLM-generated code, standard |
| **Dedicated VM** | Coral, AWS EC2, AgentComputer | Full hardware isolation | Physical attacks, hypervisor | Production credentials, regulated data |
| **Bare Metal** | Hetzner dedicated, EC2 Mac (Nitro) | Physical server | Physical access | Extreme compliance, HSM-adjacent workloads |

**Recommendation for agents:** Default to **Firecracker microVM** (E2B, Sprites.dev, Contree). This is the sweet spot: hardware-level isolation with container-like startup speed and cost.

For agents handling production credentials or regulated data, step up to **dedicated VMs**.

---

## Contree — The Git-Native Sandbox

[Contree](https://contree.dev) is worth understanding in depth because it represents a fundamentally different approach to agent sandboxing. Built by [Nebius](https://nebius.com), it treats the sandbox as a version-controlled filesystem rather than an ephemeral container.

### The Git Mental Model

- **Images = commits** — Container images with state, tagged and immutable
- **Branches = parallel work** — Fork from any checkpoint to explore alternatives
- **Tags = snapshots** — Named references to specific sandbox states
- **Merge = consolidation** — (Conceptually) combine outcomes from multiple branches

This matches how reasoning agents should actually operate: explore options, evaluate outcomes, commit to the best path, branch again. Other sandboxes treat state as linear and ephemeral, forcing agents to discard context when they try something new.

### Why This Matters for Agent Patterns

**Tree-of-thought sandboxing**: An agent can checkpoint the current environment, spawn N branches exploring different approaches, run each in parallel, evaluate, and continue with the winner. No other sandbox makes this native.

**Rollback-on-failure**: If an agent's code execution produces a bad state (failed test, corrupted file, wrong migration), the entire sandbox rolls back in milliseconds — no rebuild required.

**Preloaded environment pools**: Use checkpoint-and-branch to instantiate thousands of pre-configured environments instantly. Ideal for batch eval, SWE-bench runs, or agent benchmarking at scale.

**Per-task isolation at scale**: Each task forks from a golden base — no contamination between parallel agent runs, no setup time per task.

### Three Ways to Use It

1. **Managed service** — API-driven, no infrastructure to run
2. **MCP server (`contree-mcp`)** — 17 tools (`run`, `rsync`, `import_image`, `list_images`, `upload`, `download`, `registry_auth`, operation management) — drops into any MCP-compatible client like Claude Code
3. **Python SDK (`contree-sdk`)** — Sync + async clients with image and session abstractions

### Durability-Ranked Differentiation

Based on [independent strategic analysis](https://github.com/opencolin/contree-skill/blob/main/strategy.md), Contree's differentiation ranks in four tiers:

1. **Branching as a first-class primitive (strong, narrow).** Content-addressed storage plus microVM spawning is an architectural choice competitors can't quickly retrofit. The catch: outside tree-search agents and SWE research, branching is a feature looking for its killer use case. Adoption depends on agent workflows catching up.
2. **7,000+ preloaded SWE-bench environments (strong, narrow).** Possibly the most underleveraged asset in the category. Reproducing SWE-bench from scratch takes weeks; Contree ships it as a tag. A single image UUID can cite an exact benchmark environment in a paper or PR.
3. **MCP-native design (medium, broadening).** MCP-first rather than SDK-first — aligned with where agent tooling is standardizing. Most competitors bolted MCP on later; Contree's is primary.
4. **Nebius infrastructure integration (medium, private).** Cost advantages from microVM spawning, storage, and colocated inference are invisible externally but show up in pricing aggression.

### Where Contree Wins vs. Where It Doesn't

The sandbox market has tiered fit — not every use case wants a branching sandbox.

**Tier 1 — E2B's territory.** Individual LLM code snippets, one-shot execution, untrusted code review, data analysis notebooks. Contree can do these, but if branching and preloaded environments aren't part of the value, the incumbent wins on DX and ecosystem depth.

**Tier 2 — Contree's sweet spot (80%+ of where branching pays off):**
- SWE-bench benchmarking and research
- Tree-search coding agents
- Best-of-N sample selection
- Long-running multi-step agent traces with checkpoint/rollback
- Agent CI/CD across patches

**Tier 3 — Latent opportunities.** Training data generation for code RL, reproducibility-as-a-service, agent RL environments (the branching tree *is* the replay buffer), counterfactual debugging, multi-agent coordination, educational traces, compliance audit lineage. These are largely unbuilt today but map naturally to branching semantics.

### When Contree Is the Right Choice

- You're running multi-hypothesis reasoning agents
- You need rollback semantics without the cost of rebuilding
- You're already on Nebius (inference + GPUs) and want a unified stack
- You're running benchmarks or evals at scale (SWE-bench, Bird-SQL, custom harnesses) with shared golden environments
- You're training code-RL models and need diverse trace generation
- You want MCP-native integration with Claude Code or Cursor
- You're publishing research and want cite-able, reproducible environments

### When to Pick Something Else

- Single-shot code execution with no branching or rollback needs → E2B (simpler SDK, larger ecosystem)
- Always-on persistent agent workspaces → Sprites.dev or AgentComputer
- Heavy GPU workloads that aren't SWE-bench-shaped → Modal (better concurrency + GPU economics)
- Deep enterprise VPC requirements → Northflank or Runloop

**Resources:** [Docs](https://docs.contree.dev/) · [MCP Quickstart](https://docs.contree.dev/mcp/quickstart.html) · [Python SDK](https://docs.contree.dev/sdk/python_sdk/index.html) · [Contree Skill for Claude Code](https://github.com/opencolin/contree-skill/) · [Strategic analysis](https://github.com/opencolin/contree-skill/blob/main/strategy.md)

---

## Cloud Development Environments (CDEs)

When agents need persistent dev environments rather than ephemeral sandboxes — the Stripe Minions / devbox model. These are full OS environments with source code pre-loaded, tools installed, and services running. CDEs are the substrate you put agents *inside* (or alongside) when the workflow needs statefulness across days or weeks.

### Capabilities Matrix

| **GitHub Codespaces** | GitHub-managed | GitHub cloud | VS Code / browser | Usage-based, repo-linked | Native GitHub workflows, Codespaces-for-AI-agents patterns |
| **Gitpod / Gitpod Flex** | SaaS or self-hosted | Gitpod cloud or your infra | VS Code-style web IDE, IDE extensions | `.gitpod.yml`, prebuilds, ephemeral workspaces | Poly-repo, poly-VCS teams wanting turnkey cloud workspaces |
| **Coder** | Self-hosted | Your K8s/VMs/VPC | Browser IDE + local IDE via SSH/Desktop | Template-driven workspaces, prebuilt, policies | Enterprises needing on-prem remote dev with full control (and agent-ready) |

### Product Deep Dives

Notes from the field, ordered by how much work each is to adopt.

#### Docker Dev Containers

- **What it is:** VS Code's `.devcontainer/devcontainer.json` spec that treats a Docker container as a full dev environment. Not a platform — a spec and toolchain.
- **Scope:** Primarily local on your machine, but the same spec works on hosted runners or custom remote hosts. Useful as a "portable dev spec" that can be consumed by Codespaces, Gitpod, Coder, CodeCanvas, DevPod, and CodeCatalyst.
- **Strengths:** Simple, repo-scoped, checked into source control. Works offline. Universal across every higher-level CDE platform.
- **Limitations:** No native multi-user control plane, cost governance, or workspace lifecycle UI. Those are DIY.
- **Agent angle:** The canonical way to make a coding agent's sandbox reproducible across local dev, CI, and production.

#### JetBrains CodeCanvas

- **What it is:** JetBrains' cloud dev environment offering. Environments are defined via Docker-based templates, run IDE backends in the cloud, and are accessed via JetBrains Gateway or VS Code via extensions.
- **Key concepts:**
  - **Templates** — Versioned, shareable, Docker-image-based templates define tools, runtimes, and IDE plugins
  - **Short-lived envs** — Designed for ephemeral workspaces per task/branch, with autosuspend and auto-delete
  - **Zero-trust and observability** — WebSocket relays, SSH jump hosts, dashboards for adoption, failures, idle time
- **Integration:** Built to work with JetBrains Gateway so the IDE "brain" runs remote but the UI stays local. Also integrates with other providers like AWS CodeCatalyst, Gitpod, and Codespaces.
- **Agent angle:** Best fit when the team already lives in IntelliJ/Fleet and wants a "Codespaces but JetBrains-native" experience for both humans and agents.

#### Coder

- **What it is:** Self-hosted platform for provisioning secure, remote dev environments on your own infra (Kubernetes, Docker, VMs). Marketed for both human devs and AI agents.
- **How it works:** Operators define Terraform-based "templates" describing images, resources, and policies. Coder spins up workspaces from those templates. Access via browser IDE (code-server) or local IDE via SSH.
- **Notable features:**
  - Central dashboard for all environments and templates
  - **Prebuilt workspaces** for instant startup (no cold start for the first user)
  - **Coder Desktop** to bridge remote workspaces into native local tools
  - Explicit AI-agent-ready features (agents can be treated like a user and given their own workspace)
- **Positioning:** The right fit when you want GitHub-Codespaces-style DX but must stay on-prem / in your VPC with tight security and policy control.
- **Agent angle:** Particularly strong for agentic engineering at scale — you can give each agent its own persistent workspace, governed by the same templates and policies as your human devs.

#### Gitpod

- **What it is:** Cloud dev platform offering on-demand, pre-configured workspaces tied to Git repos via `.gitpod.yml`. Available as SaaS (`gitpod.io`) or self-hosted.
- **Core mechanics:**
  - Each repo has a `.gitpod.yml` specifying base image, startup tasks, and services
  - Workspaces are ephemeral, Docker-based, and integrate with GitHub, GitLab, Bitbucket, and Azure DevOps
  - Prebuilds warm a workspace from a `.gitpod.yml` before anyone opens it
- **Developer experience:** VS Code-compatible web IDE with settings/extensions sync. External services (databases, queues) supported via Docker Compose.
- **Strengths:** Ready-to-code workspaces, prebuilds, workspace snapshots to minimize startup friction. Multi-VCS support and a self-hosted option for regulated orgs.
- **Agent angle:** Good fit for spinning up per-task ephemeral environments that AI agents can own for the lifetime of a feature branch.

#### Amazon CodeCatalyst Dev Environments

- **What it is:** Cloud dev environments integrated into AWS CodeCatalyst, used to work on project repos with supported IDEs (JetBrains, VS Code, etc.).
- **Usage patterns:** Create envs tied to a specific project/branch or as empty envs, then clone repos manually. Launch from the CodeCatalyst console or directly from your IDE.
- **AWS angle:** Built-in access to AWS resources and CI/CD in the same "space" as your project — so an agent working in CodeCatalyst already has cloud IAM roles, pipelines, and infra access without extra plumbing.
- **Best for:** Organizations already heavy on AWS who want integrated dev + pipeline + infra without stitching together multiple vendors.

### CDE vs Sandbox — which do you want?

- **Sandbox** (E2B, Contree, Modal, Vercel Sandbox) — Short-lived, per-task, code-execution focused. Spin up, run code, shut down.
- **CDE** (Codespaces, Gitpod, Coder, CodeCanvas, CodeCatalyst) — Long-lived, per-user/project, dev-environment focused. Persistent state across sessions.

Agents frequently use both: a CDE as their "home base" that runs the agent itself, and sandboxes spawned from within the CDE for actual code execution. This is close to Stripe's devbox model (CDE-like per-agent) with sandbox-style ephemeral execution for individual tool calls.

### Practical Choosing Heuristics

- **Reproducible envs, infra you already manage** → Start with [Docker Dev Containers](https://code.visualstudio.com/docs/devcontainers/containers) as your canonical dev spec. Layer Coder, Gitpod, or CodeCanvas later if you want a hosted control plane.
- **JetBrains-first org** → [CodeCanvas](https://www.jetbrains.com/guide/remote/) for optimized JetBrains remote flows, templates, and observability. Also meshes with Gateway and CodeCatalyst.
- **Self-hosted Codespaces-like** → [Coder](https://coder.com) or self-hosted [Gitpod](https://www.gitpod.io). Coder leans infra-admin / policy-heavy, Gitpod leans repo-centric workspace automation.
- **All-in on AWS** → [CodeCatalyst Dev Environments](https://codecatalyst.aws/explore/dev-environments) for integrated repos + dev env + pipelines + AWS resources.
- **Running coding agents at scale** → Coder's agent-aware features and prebuilt workspaces make it the strongest fit for giving each agent a persistent, policy-governed workspace.

### Opinionated Stack (for K8s + multi-provider + agents)

- **Base spec:** `devcontainer.json` per repo so environments are portable across providers
- **Control plane (self-hosted):** Coder or self-hosted Gitpod on your K8s clusters, serving both human devs and agents
- **JetBrains route (optional):** Layer CodeCanvas for teams in IntelliJ/Fleet, consuming the same Docker images as the base spec

## Agent Patterns Enabled by Modern Sandboxes

Specific patterns that become possible when sandboxes support fast branching, checkpointing, and isolation.

### Pattern: Checkpoint-Explore-Commit

```
1. Agent reaches decision point → checkpoint current sandbox
2. Branch N sandboxes from checkpoint
3. Run alternative implementations in parallel
4. Score each outcome (tests pass, benchmark score, human review)
5. Destroy losing branches, continue with winner
```

Enables tree-of-thought reasoning at the environment level, not just the LLM level.

### Pattern: Golden Environment Pool

```
1. Pre-warm N sandboxes with standard config (deps installed, repo cloned, services running)
2. Tag the golden image
3. On task arrival, fork from golden (sub-second) instead of rebuilding
4. Discard task sandbox when done
```

Stripe's devbox approach, made native in Contree via Git-style tags. Reduces per-task setup time from minutes to milliseconds.

### Pattern: Destructive Operation Safety

```
1. Agent needs to run a database migration / delete files / refactor
2. Checkpoint sandbox before operation
3. Run operation; observe outcome
4. On failure, instantly restore from checkpoint
5. On success, commit new state as the baseline
```

Lets agents safely perform high-risk operations that would otherwise require extensive human oversight.

### Pattern: Fleet-Wide Reproducibility

```
1. Define sandbox image once (Dockerfile / Nix / OCI)
2. All agents in the fleet spawn from the same image
3. Deterministic behavior across CI, local dev, production agent runs
4. Bug reports reference exact image + commit → reproducible debugging
```

The sandbox becomes the unit of reproducibility, not the host machine.

### Pattern: Sandbox-as-Context

```
1. Sandbox state (files, installed packages, open processes) is part of agent context
2. Agent reasons about "what's installed" as readable context
3. New agent sessions resume from prior sandbox state without re-priming
4. Long-horizon agents maintain project context across weeks
```

Extends MCP-style context gathering to include environment state, not just files and tools.

## Integration Examples

### MCP Integration (Claude Code, Cursor, etc.)

The cleanest path for agent-sandbox integration is MCP. Agents gain sandbox tools via the same protocol they use for every other capability.

**Contree via MCP:**
```json
{
  "mcpServers": {
    "contree": {
      "command": "npx",
      "args": ["-y", "contree-mcp"],
      "env": { "CONTREE_API_KEY": "..." }
    }
  }
}
```

Once configured, agents can `import_image`, `run`, `rsync`, `upload`, `download`, and manage operations through natural tool calls.

### SDK Integration (Python)

For programmatic agent frameworks (LangChain, CrewAI, custom harnesses):

```python
from contree import ContreeClient

client = ContreeClient(api_key=...)
image = client.import_image("docker://python:3.11-slim")
session = client.run(image, "pip install numpy && python -c 'import numpy'")
result = session.wait()
```

Similar SDK patterns exist for E2B, Modal, Daytona. Choose based on which client supports your orchestration framework best.

### Custom Harness Pattern

```python
# Pseudocode for a tree-of-thought agent using Contree-style branching
base = sandbox.checkpoint()
branches = []
for approach in agent.generate_approaches(task):
    branch = sandbox.fork_from(base)
    branch.run(approach)
    branches.append((approach, branch, branch.test_score()))

winner = max(branches, key=lambda b: b[2])
for approach, branch, score in branches:
    if branch != winner[1]:
        branch.destroy()

return winner[1].artifact()
```

This pattern is impractical without fast branching (Contree) or snapshots (Modal, Sprites.dev).
